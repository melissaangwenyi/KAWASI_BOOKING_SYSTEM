<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Residence Reviews</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .reviews {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .review {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }

        .review p {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }

        .review p:last-child {
            margin-top: 10px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    {% include "header.html" %}
    {% include "navbar.html" %}
    <br>
    <section class="reviews">
        <h2>Student Residence Reviews</h2>
        {% for review in reviews %}
        <div class="review">
            <p>{{review[1]}}</p>
            <p>{{review[2]}}</p>
        </div>
        {% endfor %}
        
    </section>
    



<br> <br>
    
<section class="row">
    <div class="col-md-2"></div>
    <div class="col-md-8">{% include 'reviewsform.html' %}</div>
    <div class="col-md-2"></div>
</section>
<br>

 

    {% include 'footer.html' %}

    

    

</body>
</html>
