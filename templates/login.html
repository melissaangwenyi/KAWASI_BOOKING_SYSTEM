<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    {% include 'header.html' %}
</head>
<body>
{% include 'navbar.html'%}
<section class="row">
    <div class="col-md-6 p-4">
            <form action="/login" method="post">
                <h1><b>Enter your details to login</b></h1>
                <h4 class="text-danger">{{error}}</h4>
                <label >Username:</label> 
                <input type="text" name="username" placeholder="Enter Your username" class="form-control" required>
                <label>Password:</label>
                <input type="password" name="password" placeholder="Enter your password" class="form-control"  required> <br>
                <input type="submit" value="login" class="btn btn-success">
            </form>
    </div>
</section> 
{% include 'footer.html'%}
    
</body>
</html>
